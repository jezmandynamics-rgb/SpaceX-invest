<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit — Orbital</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .wallet-box { background: rgba(0,0,0,.3); border: 1px solid var(--border-strong); border-radius: 12px; padding: 18px; margin-top: 14px; }
  .addr { font-family: ui-monospace, "SF Mono", monospace; word-break: break-all; background: rgba(0,0,0,.35); padding: 12px 14px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); margin-top: 8px; }
  .copy-btn { margin-top: 10px; }
  .info-banner { background: rgba(106,166,255,.08); border: 1px solid rgba(106,166,255,.25); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--text-dim); margin-top: 14px; display: flex; gap: 10px; align-items: flex-start; }
  .upload-zone { border: 2px dashed var(--border-strong); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; }
  .upload-zone:hover { border-color: var(--primary); background: rgba(106,166,255,.04); }
  .upload-zone.has-file { border-style: solid; border-color: var(--success); }
  .upload-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .thumb { display: block; max-width: min(220px, 80%); max-height: 220px; width: auto; height: auto; margin: 12px auto 0; border-radius: 8px; border: 1px solid var(--border); object-fit: contain; }
  .qr-placeholder { width: 140px; height: 140px; margin: 10px auto; border-radius: 10px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supa.js"></script>
<script src="app.js"></script>
<script src="dashboard-shell.js"></script>
<script>
  
App.ready.then(async () => {

const WALLETS = {
  BTC:  { name: 'Bitcoin',         net: 'Bitcoin Network',   address: 'bc1q0n5edtj7yvw7rhrkghlc95v76lzpt78nz3xnr5' },
  ETH:  { name: 'Ethereum',        net: 'ERC-20',            address: '0x4ebf0cea9df522d855c27838170166f7a70cefd8' },
  USDT: { name: 'Tether USDT',     net: 'TRC-20 (Tron)',     address: 'TWGkNTvRca2vYGzrukTH3avsF7V4ZebAoo' },
};

const s = renderShell({ active: 'deposit', title: 'Deposit funds' });
if (s) {
  document.getElementById('app').innerHTML = s.sidebar + `
    <main class="main">${s.appbar}
      <div class="page">
        <div class="panel">
          <h3 style="margin-top:0;">Step 1 — Choose payment method</h3>
          <p style="color:var(--text-dim);margin:0 0 14px;">Send funds to one of our verified crypto wallets. Funds will reflect in your USD balance once your transaction is confirmed.</p>
          <div class="field">
            <label>Cryptocurrency</label>
            <select id="coin">
              <option value="">Select a wallet…</option>
              <option value="BTC">Bitcoin (BTC)</option>
              <option value="ETH">Ethereum (ETH)</option>
              <option value="USDT">Tether (USDT — TRC20)</option>
            </select>
          </div>
          <div id="walletInfo"></div>
        </div>

        <div class="panel">
          <h3 style="margin-top:0;">Step 2 — Enter amount</h3>
          <div class="field-row">
            <div class="field"><label>Amount (USD)</label><input type="number" id="amount" min="10" step="any" placeholder="100.00" /></div>
            <div class="field"><label>Transaction ID (optional)</label><input id="txid" placeholder="Hash from your wallet" /></div>
          </div>
        </div>

        <div class="panel">
          <h3 style="margin-top:0;">Step 3 — Upload proof of payment</h3>
          <p style="color:var(--text-dim);margin:0 0 14px;font-size:14px;">Upload a screenshot or receipt of your transaction so our team can verify it quickly.</p>
          <label for="file" class="upload-zone" id="uploadZone">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--primary);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div style="margin-top:10px;font-weight:600;" id="uploadLabel">Click to upload proof/receipt</div>
            <div style="color:var(--text-mute);font-size:12px;margin-top:4px;">PNG, JPG up to 5MB</div>
            <img id="thumb" class="thumb" style="display:none;" />
          </label>
          <input type="file" id="file" accept="image/*" style="display:none;" />

          <button id="submitBtn" class="btn btn-primary btn-block" style="margin-top:16px;">Submit deposit request</button>
          <p style="color:var(--text-mute);font-size:12px;text-align:center;margin-top:10px;">⏱ Deposits are typically credited within 30–50 minutes after confirmation.</p>
        </div>

        <div class="panel">
          <h3 style="margin-top:0;">Recent deposit requests</h3>
          <div id="deposits"></div>
        </div>
      </div>
    </main>`;

  const coinSel = document.getElementById('coin');
  const walletInfo = document.getElementById('walletInfo');
  coinSel.addEventListener('change', () => {
    const w = WALLETS[coinSel.value];
    if (!w) { walletInfo.innerHTML = ''; return; }
    walletInfo.innerHTML = `
      <div class="wallet-box">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;">
          <div>
            <div style="font-size:13px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.1em;">${w.name} · ${w.net}</div>
            <div style="font-weight:700;margin-top:4px;">Deposit address</div>
            <div class="addr">${w.address}</div>
            <button class="btn btn-sm copy-btn" id="copyBtn">📋 Copy address</button>
          </div>
        </div>
        <div class="info-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px;color:var(--primary);"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
          <span>Send only <strong>${w.name}</strong> via the <strong>${w.net}</strong> network. Sending other coins or using the wrong network will result in permanent loss of funds.</span>
        </div>
      </div>`;
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(w.address).then(() => App.toast('Address copied'));
    });
  });

  const fileInput = document.getElementById('file');
  const zone = document.getElementById('uploadZone');
  const thumb = document.getElementById('thumb');
  let fileData = null;
  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0]; if (!f) return;
    if (f.size > 5 * 1024 * 1024) return App.toast('File too large (max 5MB)', 'error');
    const reader = new FileReader();
    reader.onload = (e) => {
      fileData = e.target.result;
      thumb.src = fileData; thumb.style.display = 'block';
      zone.classList.add('has-file');
      document.getElementById('uploadLabel').textContent = f.name + ' — ready to submit';
    };
    reader.readAsDataURL(f);
  });

  function renderDeposits() {
    const list = App.Deposits.forUser();
    const el = document.getElementById('deposits');
    if (list.length === 0) { el.innerHTML = '<p style="color:var(--text-mute);margin:0;">No deposits yet.</p>'; return; }
    el.innerHTML = `<table class="tbl"><thead><tr><th>When</th><th>Coin</th><th>Amount</th><th>Status</th></tr></thead><tbody>${
      list.map(d => `<tr><td>${new Date(d.at).toLocaleString()}</td><td><strong>${d.coin}</strong></td><td>$${d.amount.toLocaleString()}</td><td><span class="chg" style="background:rgba(255,184,107,.15);color:var(--accent);">${(d.status||'pending').toUpperCase()}</span></td></tr>`).join('')
    }</tbody></table>`;
  }
  renderDeposits();

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const coin = coinSel.value;
    const amount = parseFloat(document.getElementById('amount').value);
    if (!coin) return App.toast('Choose a cryptocurrency', 'error');
    if (!amount || amount < 10) return App.toast('Minimum deposit is $10', 'error');
    if (!fileData) return App.toast('Please upload payment proof', 'error');
    try {
      await App.Deposits.create({ coin, amount, txid: document.getElementById('txid').value, proofDataUrl: fileData });
      App.toast('Deposit submitted — funds will reflect in ~50 minutes');
    } catch (e) { return App.toast(e.message, 'error'); }
    document.getElementById('amount').value = ''; document.getElementById('txid').value = '';
    fileData = null; thumb.style.display = 'none'; zone.classList.remove('has-file');
    document.getElementById('uploadLabel').textContent = 'Click to upload proof/receipt';
    renderDeposits();
  });
}

});
</script>
</body>
</html>
