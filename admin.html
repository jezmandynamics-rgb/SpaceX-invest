<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Orbital</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .admin-tabs { display: flex; gap: 6px; flex-wrap: wrap; background: var(--panel); padding: 6px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 18px; }
  .admin-tabs button { background: transparent; color: var(--text-dim); border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
  .admin-tabs button.active { background: var(--grad-primary); color: #06112a; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .stat .lbl { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .1em; }
  .stat .val { font-size: 26px; font-weight: 800; margin-top: 6px; }
  .stat .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
  .badge.blocked { background: rgba(248,113,113,.15); color: var(--danger); }
  .badge.active  { background: rgba(74,222,128,.15);  color: var(--success); }
  .badge.pending { background: rgba(255,184,107,.15); color: var(--accent); }
  .badge.approved{ background: rgba(74,222,128,.15);  color: var(--success); }
  .badge.rejected{ background: rgba(248,113,113,.15); color: var(--danger); }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .row-actions .btn { padding: 6px 10px; font-size: 12px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border-strong); border-radius: 14px; padding: 22px; max-width: 420px; width: 100%; }
  .modal h3 { margin: 0 0 14px; }
  .admin-brand { display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px; }
  .admin-bar { display:flex; justify-content:space-between; align-items:center; padding: 16px 22px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap:wrap; gap:10px; }
  .admin-bar .who { display:flex; align-items:center; gap:10px; font-size:13px; color: var(--text-dim); }
  .admin-bar .who .av { width:32px;height:32px;border-radius:50%;background:var(--grad-primary);color:#06112a;display:grid;place-items:center;font-weight:800; }
  .admin-page { padding: 22px; max-width: 1200px; margin: 0 auto; }
  @media (max-width: 540px) { .admin-page { padding: 14px; } .stat .val { font-size: 22px; } }
</style>
</head>
<body>
<div id="root"></div>
<div class="modal-bg" id="modal"><div class="modal" id="modalBody"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supa.js"></script>
<script src="app.js"></script>
<script>
App.ready.then(async () => {
if (!App.Auth.requireAdmin()) {} else {
  const admin = App.Auth.getUser();
  const root = document.getElementById('root');
  const fmt = (n) => '$' + Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2});
  const dt = (t) => new Date(t).toLocaleString();

  root.innerHTML = `
    <div class="admin-bar">
      <div class="admin-brand">
        <span class="brand-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M14 3l7 7-7 7v-4H3v-6h11V3z"/></svg></span>
        Orbital · Admin
      </div>
      <div class="who">
        <div class="av">A</div>
        <span>${admin.full_name} · @${admin.username}</span>
        <button class="btn btn-sm" onclick="App.Auth.logout()">Sign out</button>
      </div>
    </div>
    <div class="admin-page">
      <div class="stat-grid" id="stats"></div>
      <div class="admin-tabs">
        <button data-tab="users" class="active">Users</button>
        <button data-tab="deposits">Deposits</button>
        <button data-tab="withdrawals">Withdrawals</button>
      </div>
      <div class="panel" id="tabBody"></div>
    </div>`;

  function renderStats() {
    const users = App.Auth.users().filter(u => u.role !== 'admin');
    const deps = App.Deposits.adminAll ? App.Deposits.adminAll() : (window.AdminCache?.deposits || []);
    const wds = window.AdminCache?.withdrawals || [];
    const pendDep = deps.filter(d => d.status === 'pending').length;
    const pendW = wds.filter(w => w.status === 'pending').length;
    const blocked = users.filter(u => u.blocked).length;
    const totalBal = users.reduce((s,u) => s + (Number(u.balance)||0), 0);
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="lbl">Registered users</div><div class="val">${users.length}</div><div class="sub">${blocked} blocked</div></div>
      <div class="stat"><div class="lbl">Deposit requests</div><div class="val">${deps.length}</div><div class="sub">${pendDep} pending</div></div>
      <div class="stat"><div class="lbl">Withdrawal requests</div><div class="val">${wds.length}</div><div class="sub">${pendW} pending</div></div>
      <div class="stat"><div class="lbl">Total user balance</div><div class="val">${fmt(totalBal)}</div><div class="sub">across all accounts</div></div>`;
  }

  let activeTab = 'users';
  function renderTab() {
    const body = document.getElementById('tabBody');
    if (activeTab === 'users') body.innerHTML = renderUsers();
    else if (activeTab === 'deposits') body.innerHTML = renderDeposits();
    else body.innerHTML = renderWithdrawals();
  }
  function renderUsers() {
    const users = App.Auth.users().filter(u => u.role !== 'admin');
    if (!users.length) return '<p style="color:var(--text-mute);">No users registered yet.</p>';
    return `<h3 style="margin-top:0;">Registered users (${users.length})</h3>
      <div class="table-wrap"><table class="tbl">
      <thead><tr><th>User</th><th>Email</th><th>Joined</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${users.map(u => `
        <tr>
          <td><strong>${u.full_name||u.username}</strong><div style="font-size:12px;color:var(--text-mute);">@${u.username}</div></td>
          <td style="font-size:13px;">${u.email}</td>
          <td style="font-size:12px;color:var(--text-dim);">${dt(u.createdAt)}</td>
          <td><strong>${fmt(u.balance)}</strong></td>
          <td><span class="badge ${u.blocked?'blocked':'active'}">${u.blocked?'Blocked':'Active'}</span></td>
          <td><div class="row-actions">
            <button class="btn" onclick="editBalance('${u.id}')">Edit balance</button>
            <button class="btn ${u.blocked?'btn-success':'btn-danger'}" onclick="toggleBlock('${u.id}', ${!!u.blocked})">${u.blocked?'Unblock':'Block'}</button>
            <button class="btn" onclick="deleteUser('${u.id}')">Delete</button>
          </div></td>
        </tr>`).join('')}</tbody></table></div>`;
  }
  function renderDeposits() {
    const deps = (window.AdminCache?.deposits || []).slice();
    if (!deps.length) return '<p style="color:var(--text-mute);">No deposit requests yet.</p>';
    const users = App.Auth.users();
    return `<h3 style="margin-top:0;">Deposit requests (${deps.length})</h3>
      <div class="table-wrap"><table class="tbl">
      <thead><tr><th>When</th><th>User</th><th>Coin</th><th>Amount</th><th>TxID</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${deps.map(d => {
        const u = users.find(x=>x.id===d.user_id);
        return `<tr>
          <td style="font-size:12px;">${dt(d.created_at)}</td>
          <td>${u?('@'+u.username):'<i>deleted</i>'}</td>
          <td><strong>${d.method}</strong></td>
          <td><strong>${fmt(d.amount)}</strong></td>
          <td style="font-family:ui-monospace,monospace;font-size:11px;">${d.txid?d.txid.slice(0,16)+'…':'—'}</td>
          <td><span class="badge ${d.status==='approved'?'approved':d.status==='rejected'?'rejected':'pending'}">${d.status}</span></td>
          <td><div class="row-actions">
            ${d.status==='pending'?`<button class="btn btn-success" onclick="approveDeposit('${d.id}')">Approve</button>
            <button class="btn btn-danger" onclick="rejectDeposit('${d.id}')">Reject</button>`:'—'}
          </div></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  }
  function renderWithdrawals() {
    const wds = (window.AdminCache?.withdrawals || []).slice();
    if (!wds.length) return '<p style="color:var(--text-mute);">No withdrawal requests yet.</p>';
    const users = App.Auth.users();
    return `<h3 style="margin-top:0;">Withdrawal requests (${wds.length})</h3>
      <div class="table-wrap"><table class="tbl">
      <thead><tr><th>When</th><th>User</th><th>Coin</th><th>Amount</th><th>Wallet</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${wds.map(w => {
        const u = users.find(x=>x.id===w.user_id);
        return `<tr>
          <td style="font-size:12px;">${dt(w.created_at)}</td>
          <td>${u?('@'+u.username):'<i>deleted</i>'}</td>
          <td><strong>${w.method}</strong></td>
          <td><strong>${fmt(w.amount)}</strong></td>
          <td style="font-family:ui-monospace,monospace;font-size:11px;">${(w.wallet_address||'').slice(0,10)}…${(w.wallet_address||'').slice(-6)}</td>
          <td><span class="badge ${w.status==='approved'?'approved':w.status==='rejected'?'rejected':'pending'}">${w.status}</span></td>
          <td><div class="row-actions">
            ${w.status==='pending'?`<button class="btn btn-success" onclick="approveWithdraw('${w.id}')">Approve</button>
            <button class="btn btn-danger" onclick="rejectWithdraw('${w.id}')">Reject & refund</button>`:'—'}
          </div></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  }

  document.querySelectorAll('.admin-tabs button').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.admin-tabs button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); activeTab = b.dataset.tab; renderTab();
    });
  });

  // expose admin caches via window.AdminCache (read from same in-memory Cache via App)
  window.AdminCache = {
    get deposits() { return _adminDeps(); },
    get withdrawals() { return _adminWds(); },
  };
  function _adminDeps() {
    // Pull from App internal cache via a side channel — we re-query each render
    return _ac.deposits;
  }
  function _adminWds() { return _ac.withdrawals; }
  const _ac = { deposits: [], withdrawals: [] };
  async function reload() {
    const [{ data: d }, { data: w }] = await Promise.all([
      sb.from('deposits').select('*').order('created_at',{ascending:false}),
      sb.from('withdrawals').select('*').order('created_at',{ascending:false}),
    ]);
    _ac.deposits = d || []; _ac.withdrawals = w || [];
  }
  async function refresh() { await reload(); renderStats(); renderTab(); }

  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modalBody');
  function openModal(html) { modalBody.innerHTML = html; modal.classList.add('show'); }
  function closeModal() { modal.classList.remove('show'); }
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  window.closeModal = closeModal;

  window.editBalance = (id) => {
    const u = App.Auth.users().find(x=>x.id===id); if (!u) return;
    openModal(`<h3>Edit balance — @${u.username}</h3>
      <div class="field"><label>New balance (USD)</label><input id="newBal" type="number" step="any" value="${u.balance}" /></div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-block" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-block" onclick="saveBalance('${id}')">Save</button>
      </div>`);
  };
  window.saveBalance = async (id) => {
    const val = parseFloat(document.getElementById('newBal').value);
    if (isNaN(val) || val < 0) return App.toast('Invalid amount', 'error');
    await App.Auth.adminSetBalance(id, val); App.toast('Balance updated'); closeModal(); refresh();
  };
  window.toggleBlock = async (id, current) => {
    await App.Auth.adminSetBlocked(id, !current);
    App.toast(!current ? 'User blocked' : 'User unblocked'); refresh();
  };
  window.deleteUser = async (id) => {
    if (!confirm('Permanently delete this user profile?')) return;
    await App.Auth.adminDeleteUser(id); App.toast('User deleted'); refresh();
  };
  window.approveDeposit = async (id) => { await App.Deposits.adminApprove(id); App.toast('Deposit approved — user credited'); refresh(); };
  window.rejectDeposit  = async (id) => { await App.Deposits.adminReject(id); App.toast('Deposit rejected'); refresh(); };
  window.approveWithdraw = async (id) => { await App.Withdrawals.adminApprove(id); App.toast('Withdrawal approved'); refresh(); };
  window.rejectWithdraw  = async (id) => { await App.Withdrawals.adminReject(id); App.toast('Withdrawal rejected — funds refunded'); refresh(); };

  refresh();
}

});
</script>
</body>
</html>
